server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: jackpot-service
  datasource:
    url: jdbc:h2:mem:jackpot;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;LOCK_TIMEOUT=10000
    username: sa
    password: ""
    hikari:
      maximum-pool-size: 20
      minimum-idle: 2
  sql:
    init:
      mode: never
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: jackpot-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.jackpot.dto
        spring.json.value.default.type: com.example.jackpot.dto.Bet
    listener:
      ack-mode: record
      concurrency: 3

app:
  kafka:
    topic: jackpot-bets
    dead-letter-topic: jackpot-bets-dlt
    partitions: 3
    publish-timeout: 5s
    embedded:
      enabled: true
      port: 0

logging:
  level:
    org.apache.kafka: WARN
    org.apache.zookeeper: WARN
    kafka: WARN
    state.change.logger: WARN
